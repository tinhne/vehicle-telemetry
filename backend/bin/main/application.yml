spring:
  application:
    name: vehicle-telemetry-backend
  datasource:
    url:      ${DB_URL:jdbc:postgresql://localhost:5432/vehicle_telemetry}
    username: ${DB_USER:telemetry_user}
    password: ${DB_PASS:telemetry_pass}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

telemetry:
  simulator:
    broadcast-interval-ms: 100
    vehicle-id: "VH-DEMO-001"
  websocket:
    topic:         /topic/telemetry
    warning-topic: /topic/warnings
  thresholds:
    speed-max-kmh:           200
    rpm-max:                 7000
    fuel-min-percent:        10.0
    engine-temp-max-celsius: 110.0
    engine-temp-min-celsius: 60.0
    battery-voltage-min:     11.5
    battery-voltage-max:     15.0
    tire-pressure-min-psi:   28.0
    tire-pressure-max-psi:   38.0

logging:
  level:
    root: INFO
    com.vehicletelemetry: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{30} - %msg%n"
